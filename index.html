<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>끼토 마감 질주 (솜솜시티 러너 · M0)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#f3ede2; font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  #app { width:min(420px,100vw); position:relative; user-select:none; }
  canvas { display:block; width:100%; background:#fdfbf5; border-radius:12px; touch-action:none; }
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; border-radius:12px; padding:24px; text-align:center; }
  .hidden { display:none; }
  h1 { font-size:27px; color:#5a4a3a; }
  .sub { color:#7a6a5a; font-size:13px; }
  button { border:2px solid #222; background:#fff; border-radius:10px; padding:11px 26px; font-size:16px; font-weight:800; cursor:pointer; box-shadow:2px 2px 0 #222; }
  button:active { transform:translate(2px,2px); box-shadow:none; }
  #title { overflow:hidden; justify-content:space-between; padding:34px 18px 30px; }
  #titleBg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #titleTop, #titleBtns { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  #logo { font-size:30px; color:#5a4a3a; text-shadow:-2px -2px 0 #fdfbf5,2px -2px 0 #fdfbf5,-2px 2px 0 #fdfbf5,2px 2px 0 #fdfbf5,0 3px 0 #fdfbf5; }
  #logoSub { font-size:13px; color:#6a5a48; text-shadow:-1px -1px 0 #fdfbf5,1px -1px 0 #fdfbf5,-1px 1px 0 #fdfbf5,1px 1px 0 #fdfbf5; }
  #result, #ranking { background:#fdfbf5; }
  #resQuote { font-size:14px; color:#5a4a3a; background:#f3ede2; border-radius:8px; padding:8px 12px; }
  #nameRow { display:none; gap:8px; align-items:center; }
  #nameRow input { border:2px solid #222; border-radius:10px; padding:9px 12px; font-size:15px; width:130px; background:#fff; }
  .rankrow { display:flex; align-items:center; gap:10px; padding:7px 10px; border-bottom:1px dashed #d8cdb8; font-size:14px; color:#5a4a3a; text-align:left; }
  .rankrow .rk { width:38px; font-weight:800; }
  .rankrow .rname { font-weight:800; flex:1; }
  .rankrow .rscore { font-weight:800; color:#b08a3a; }
  .rankrow.me { background:#f6eed8; border-radius:8px; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv" width="420" height="680"></canvas>

  <div id="title" class="screen">
    <img id="titleBg" src="assets/bg_runner.png" onerror="this.style.display='none'" alt="">
    <div id="titleTop">
      <div id="logo">🏃 끼토 마감 질주</div>
      <div id="logoSub">마감이다! 은행 거리를 달려 최대한 멀리.<br>탭/스페이스 = 점프 (공중에서 한 번 더!)</div>
    </div>
    <div id="titleBtns">
      <button onclick="ui.play()">달리기 시작</button>
      <button onclick="ui.showRanking()" style="font-size:14px;padding:8px 18px;">🏆 솜솜 랭킹</button>
    </div>
  </div>

  <div id="ranking" class="screen hidden">
    <h1>🏆 마감 질주 랭킹</h1>
    <div class="sub">전 세계 솜솜시티 주민들의 질주 기록</div>
    <div id="rankList" style="width:100%;max-height:430px;overflow-y:auto;"></div>
    <button onclick="ui.toTitle()">닫기</button>
  </div>

  <div id="result" class="screen hidden">
    <h1 id="resTitle">결과</h1>
    <img id="resImg" src="" style="height:130px;">
    <div id="resQuote"></div>
    <div id="resScore" style="font-size:22px;font-weight:800;color:#5a4a3a;"></div>
    <div id="resDetail" class="sub"></div>
    <div id="resBest" class="sub"></div>
    <div id="nameRow"><input id="nameInput" maxlength="8" placeholder="이름 (8자)"><button id="submitBtn" onclick="submitScore()">🏆 랭킹 등록</button></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button onclick="ui.play()">다시 달리기</button>
      <button onclick="shareCard()">📸 자랑하기</button>
    </div>
    <button onclick="ui.toTitle()" style="font-size:13px;padding:7px 16px;">메인으로</button>
  </div>
</div>

<script>
// ================= 기본 =================
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = 420, H = 680, GROUND = H - 86;
const DPR = Math.min(3, window.devicePixelRatio || 1);
cv.width = W * DPR; cv.height = H * DPR;
const $ = id => document.getElementById(id);
const LOSE = '으아아—! 마감 늦었어!';

function downscale(src, tw) {
  let c = src;
  while (c.width / 2 > tw) {
    const n = document.createElement('canvas');
    n.width = (c.width/2)|0; n.height = (c.height/2)|0;
    const x = n.getContext('2d'); x.imageSmoothingEnabled = true; x.imageSmoothingQuality = 'high';
    x.drawImage(c, 0, 0, n.width, n.height); c = n;
  }
  return c;
}
function keyOutWhiteBg(im) {
  const c = document.createElement('canvas'); c.width = im.naturalWidth; c.height = im.naturalHeight;
  const x = c.getContext('2d'); x.drawImage(im, 0, 0);
  const d = x.getImageData(0,0,c.width,c.height), p = d.data, w = c.width, h = c.height;
  const white = i => p[i]>228 && p[i+1]>228 && p[i+2]>228;
  const seen = new Uint8Array(w*h), q = [];
  for (let X=0;X<w;X++) q.push(X,(h-1)*w+X);
  for (let Y=0;Y<h;Y++) q.push(Y*w,Y*w+w-1);
  while (q.length) { const n=q.pop(); if(n<0||n>=w*h||seen[n])continue; seen[n]=1; if(!white(n*4))continue; p[n*4+3]=0; const X=n%w; if(X>0)q.push(n-1); if(X<w-1)q.push(n+1); q.push(n-w,n+w); }
  x.putImageData(d,0,0); return c;
}

// ================= 에셋 =================
let kkitoSpr = null, kkitoFallback = new Image();
kkitoFallback.src = 'assets/sd_kkito.png';
const kr = new Image(); kr.src = 'assets/run_kkito.png';
kr.onload = () => { try { kkitoSpr = downscale(keyOutWhiteBg(kr), 60*DPR*1.6); } catch(e) { kkitoSpr = kr; } };
kr.onerror = () => { kkitoFallback.onload = () => { try { kkitoSpr = downscale(keyOutWhiteBg(kkitoFallback), 100); } catch(e) { kkitoSpr = kkitoFallback; } }; };

let bg = new Image(), bgReady = false; bg.src = 'assets/bg_runner.png'; bg.onload = () => bgReady = true;
let acorn = null; { const a = new Image(); a.src = 'assets/prop_acorn.png'; a.onload = () => { try { acorn = downscale(keyOutWhiteBg(a), 90); } catch(e){} }; }

// ================= 오디오 =================
let AC = null, muted = localStorage.getItem('runner_muted')==='1', bgmT = null, bgmStep = 0;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function tone(f,d,t,g,when,sl){ const a=ac(),o=a.createOscillator(),gn=a.createGain(),t0=a.currentTime+(when||0); o.type=t||'square'; o.frequency.setValueAtTime(f,t0); if(sl)o.frequency.exponentialRampToValueAtTime(sl,t0+d); gn.gain.setValueAtTime(g||.07,t0); gn.gain.exponentialRampToValueAtTime(.0001,t0+d); o.connect(gn); gn.connect(a.destination); o.start(t0); o.stop(t0+d+.02); }
function sfx(n){ if(muted) return; try {
  if(n==='jump') tone(320,.13,'square',.05,0,640);
  else if(n==='dj') tone(440,.13,'square',.05,0,820);
  else if(n==='land') tone(150,.06,'triangle',.05);
  else if(n==='coin'){ tone(880,.06,'square',.04); tone(1320,.09,'square',.04,.05); }
  else if(n==='hit'){ tone(220,.22,'sawtooth',.08,0,70); tone(110,.25,'square',.05,.02,60); }
  else if(n==='record') [523,659,784].forEach((f,i)=>tone(f,.16,'square',.05,i*.09));
  else if(n==='over') [392,311,233].forEach((f,i)=>tone(f,.25,'triangle',.07,i*.18));
} catch(e){} }
const BGM = [392,494,587,494,440,392,440,494,587,659,587,494,440,392,330,392];
function startBgm(){ if(muted||bgmT) return; try{ac();}catch(e){return;} bgmT = setInterval(()=>{ if(muted||!S||S.over)return; tone(BGM[bgmStep%BGM.length],.26,'triangle',.018); bgmStep++; },230); }
function stopBgm(){ clearInterval(bgmT); bgmT=null; }

// ================= 게임 상태 =================
let S = null, raf = null;
const GRAV = 2500, JUMP_V = 760, DJ_V = 690, PX = 96;
function newState(){
  return { dist:0, speed:230, coins:0, y:0, vy:0, onGround:true, jumps:2, run:0,
    obs:[], gems:[], parts:[], floats:[], nextObs:340, nextGem:200,
    over:false, overAt:0, shake:0, hitstop:0, last:performance.now(),
    best:+(localStorage.getItem('runner_best')||0), recordShown:false };
}
function jump(){
  const s = S; if(!s || s.over) return;
  if(s.jumps<=0) return;
  s.jumps--; s.vy = s.onGround ? -JUMP_V : -DJ_V; s.onGround = false;
  sfx(s.jumps===1 ? 'jump' : 'dj');
  for(let i=0;i<6;i++) s.parts.push({x:PX-10, y:GROUND, vx:-60-Math.random()*60, vy:-20-Math.random()*30, g:300, life:.4, max:.4, size:3, col:'#d8c8a8'});
}

// ================= 스폰 =================
function spawnObstacle(s){
  const r = Math.random();
  // low(점프1), tall(점프1 높이), gap-pair(더블점프 유도)
  let h, w;
  if(r < 0.5){ h = 30+Math.random()*14; w = 26+Math.random()*16; }      // 그루터기/낙엽더미
  else if(r < 0.82){ h = 52+Math.random()*16; w = 24+Math.random()*10; } // 키큰 표지판
  else { h = 38; w = 22; s.obs.push({x:W+40+90, w:24, h:46, kind:1}); }  // 연속 2개
  s.obs.push({x:W+40, w, h, kind: h>48?2:1});
}
function spawnGems(s){
  const cnt = 3+(Math.random()*3|0), baseY = GROUND - (40+Math.random()*150), arc = Math.random()<.5;
  for(let i=0;i<cnt;i++){
    const yy = arc ? baseY - Math.sin(i/(cnt-1)*Math.PI)*46 : baseY;
    s.gems.push({x:W+30+i*34, y:yy, taken:false});
  }
}

// ================= 루프 =================
function loop(now){
  const s = S; if(!s) return;
  let dt = Math.min(.05,(now-s.last)/1000); s.last = now;
  if(s.over) dt *= .25;
  if(s.hitstop>0){ s.hitstop-=dt; dt=0; }

  if(!s.over){
    s.speed = Math.min(640, s.speed + 7*dt);
    s.dist += s.speed*dt;
    s.run += s.speed*dt;
    // 물리
    s.vy += GRAV*dt; s.y += s.vy*dt;
    if(s.y >= 0){ if(!s.onGround){ sfx('land'); for(let i=0;i<5;i++) s.parts.push({x:PX,y:GROUND,vx:(Math.random()-.3)*80,vy:-15,g:300,life:.3,max:.3,size:3,col:'#d8c8a8'}); } s.y=0; s.vy=0; s.onGround=true; s.jumps=2; }
    if(s.onGround && Math.random()<.25) s.parts.push({x:PX-14,y:GROUND-2,vx:-50,vy:-8,g:120,life:.3,max:.3,size:2.5,col:'rgba(180,160,120,.5)'});
    // 스폰
    s.nextObs -= s.speed*dt; if(s.nextObs<=0){ spawnObstacle(s); s.nextObs = 300 + Math.random()*230; }
    s.nextGem -= s.speed*dt; if(s.nextGem<=0){ spawnGems(s); s.nextGem = 360 + Math.random()*260; }
  }

  const px0 = PX-18, px1 = PX+18, py = GROUND + s.y, ptop = py - 64;
  for(const o of s.obs){
    o.x -= s.speed*dt;
    const ox0=o.x, ox1=o.x+o.w, otop=GROUND-o.h;
    if(!s.over && px1>ox0+4 && px0<ox1-4 && py>otop+4){
      s.over=true; s.overAt=now; s.shake=.5; s.hitstop=.12; sfx('hit'); sfx('over'); stopBgm();
    }
  }
  s.obs = s.obs.filter(o=>o.x+o.w>-20);
  for(const g of s.gems){
    g.x -= s.speed*dt;
    if(!g.taken && Math.abs(g.x-PX)<24 && Math.abs(g.y-(py-32))<32){
      g.taken=true; s.coins++; s.dist+=30; sfx('coin');
      for(let i=0;i<8;i++) s.parts.push({x:g.x,y:g.y,vx:(Math.random()-.5)*120,vy:(Math.random()-.5)*120-40,g:300,life:.5,max:.5,size:3,col:['#b5824a','#e8c14a','#fff'][i%3]});
      s.floats.push({x:g.x,y:g.y-10,txt:'+30',col:'#b08a3a',life:.7});
    }
  }
  s.gems = s.gems.filter(g=>!g.taken && g.x>-20);

  const score = Math.floor(s.dist/12);
  if(!s.recordShown && s.best>0 && score>s.best && !s.over){ s.recordShown=true; sfx('record'); s.floats.push({x:PX,y:ptop-10,txt:'신기록!',col:'#d2452a',life:1.4}); }

  for(const p of s.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; }
  s.parts = s.parts.filter(p=>p.life>0);
  for(const f of s.floats){ f.life-=dt; f.y-=34*dt; }
  s.floats = s.floats.filter(f=>f.life>0);
  s.shake = Math.max(0,s.shake-dt);

  draw(s, now, score);
  if(s.over && now-s.overAt>800) return endGame(score);
  raf = requestAnimationFrame(loop);
}

// ================= 그리기 =================
function draw(s, now, score){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.save();
  if(s.shake>0){ const m=s.shake*16; ctx.translate((Math.random()-.5)*m,(Math.random()-.5)*m); }

  // 배경 (패럴랙스)
  if(bgReady){
    const bw = H*0.62*bg.width/bg.height; // cover height-ish band
    const sc = (GROUND+10)/bg.height; const dw = bg.width*sc, dh = bg.height*sc;
    let off = -((s.dist*0.4) % dw);
    for(let x=off; x<W; x+=dw) ctx.drawImage(bg, x, (GROUND+10)-dh, dw, dh);
  } else {
    ctx.fillStyle='#fdfbf5'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f0d878'; for(let x=-10;x<=W+10;x+=46) { ctx.beginPath(); ctx.arc(x,40,34,0,Math.PI); ctx.fill(); }
  }
  // 길
  ctx.fillStyle='#efe6d2'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='#222'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
  // 길 위 흐르는 점선(속도감)
  ctx.strokeStyle='rgba(150,130,90,.35)'; ctx.lineWidth=3; ctx.beginPath();
  let lo = -((s.dist) % 60);
  for(let x=lo; x<W; x+=60){ ctx.moveTo(x,GROUND+22); ctx.lineTo(x+26,GROUND+22); } ctx.stroke();

  // 장애물
  for(const o of s.obs){
    const top = GROUND-o.h;
    ctx.fillStyle = o.kind===2 ? '#b07a4a' : '#9a7a4a';
    ctx.strokeStyle='#222'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(o.x, top, o.w, o.h, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.roundRect(o.x+3, top+3, o.w-6, 6, 3); ctx.fill();
  }
  // 도토리
  for(const g of s.gems){
    if(acorn){ const w=26,h=26*acorn.height/acorn.width; ctx.drawImage(acorn, g.x-w/2, g.y-h/2, w, h); }
    else { ctx.font='22px serif'; ctx.textAlign='center'; ctx.fillText('🌰', g.x, g.y+7); }
  }
  // 파티클
  for(const p of s.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); } ctx.globalAlpha=1;

  // 끼토
  const im = kkitoSpr || (kkitoFallback.complete?kkitoFallback:null);
  const bob = s.onGround ? Math.sin(s.run*0.05)*3 : 0;
  const py = GROUND + s.y;
  ctx.save();
  ctx.translate(PX, py - 2 + bob);
  if(!s.onGround) ctx.rotate(s.vy<0 ? -0.18 : 0.16);
  // 그림자
  ctx.save(); ctx.setTransform(DPR,0,0,DPR,0,0);
  const sh = Math.max(.12,.32-(-s.y)/600); ctx.globalAlpha=sh; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(PX, GROUND+4, 26-(-s.y)/30, 6, 0, 0, 7); ctx.fill(); ctx.restore();
  if(im){ const dw=64, dh=dw*(im.height||im.naturalHeight)/(im.width||im.naturalWidth); ctx.drawImage(im, -dw/2, -dh, dw, dh); }
  ctx.restore();

  // 플로터
  for(const f of s.floats){ ctx.globalAlpha=Math.min(1,f.life/.4); ctx.font='800 16px sans-serif'; ctx.textAlign='center'; ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.strokeText(f.txt,f.x,f.y); ctx.fillStyle=f.col; ctx.fillText(f.txt,f.x,f.y); } ctx.globalAlpha=1;

  // HUD
  ctx.fillStyle='#5a4a3a'; ctx.font='800 20px sans-serif'; ctx.textAlign='left';
  ctx.fillText(score+' m', 16, 34);
  ctx.font='800 15px sans-serif'; ctx.textAlign='right';
  ctx.fillText('🌰 '+s.coins, W-14, 32);
  ctx.restore();
}

// ================= 종료/결과 =================
function endGame(score){
  const s = S;
  const best = Math.max(score, +(localStorage.getItem('runner_best')||0));
  const isNew = score>0 && score>=best;
  localStorage.setItem('runner_best', best);
  $('resTitle').textContent = isNew ? '🎉 최고 기록!' : '게임 오버';
  const spr = kkitoSpr;
  $('resImg').src = spr && spr.toDataURL ? spr.toDataURL() : 'assets/02_kkito.png';
  $('resQuote').textContent = '"'+LOSE+'"';
  $('resScore').textContent = score+' m';
  $('resDetail').textContent = '도토리 '+s.coins+'개 수집';
  $('resBest').textContent = '최고기록: '+best+' m';
  lastResult = { score, coins:s.coins, best, isNew };
  $('nameRow').style.display = score>=1 ? 'flex' : 'none';
  $('nameInput').value = localStorage.getItem('somsom_name')||'';
  $('submitBtn').disabled=false; $('submitBtn').textContent='🏆 랭킹 등록';
  document.querySelectorAll('#result .cf').forEach(e=>e.remove());
  if(isNew){ const cols=['#e8c14a','#e8915a','#8a6fa8','#7fa05b','#d2452a']; for(let i=0;i<22;i++){ const d=document.createElement('div'); d.className='cf'; d.style.cssText='position:absolute;top:-14px;width:10px;height:14px;border-radius:3px;pointer-events:none;left:'+(Math.random()*100)+'%;background:'+cols[i%5]+';animation:cf 2.6s ease-in '+(Math.random()*.8)+'s forwards;'; $('result').appendChild(d); setTimeout(()=>d.remove(),3600);} }
  ui.show('result');
}
const st = document.createElement('style'); st.textContent='@keyframes cf{to{transform:translateY(740px) rotate(540deg);opacity:.1;}}'; document.head.appendChild(st);

// ================= 랭킹 (Firebase Firestore) =================
const FB_KEY='AIzaSyBfld7SRrVTxDG0nE_6Z3Mw5kSRTo5bIGY';
const FB='https://firestore.googleapis.com/v1/projects/somsom-city/databases/(default)/documents';
async function lbGet(){
  try{
    const r=await fetch(FB+':runQuery?key='+FB_KEY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({structuredQuery:{from:[{collectionId:'runner_scores'}],orderBy:[{field:{fieldPath:'s'},direction:'DESCENDING'}],limit:100}})});
    const j=await r.json(); if(!r.ok||!Array.isArray(j)) return null;
    const all=j.filter(d=>d.document).map(d=>{const f=d.document.fields||{};return{n:(f.n&&f.n.stringValue)||'?',s:+((f.s&&f.s.integerValue)||0)};});
    const best={}; for(const e of all) if(!best[e.n]||e.s>best[e.n].s) best[e.n]=e;
    return Object.values(best).sort((a,b)=>b.s-a.s).slice(0,10);
  }catch(e){ return null; }
}
async function submitScore(){
  if(!lastResult) return;
  const name=($('nameInput').value||'').trim().slice(0,8)||'솜솜이';
  localStorage.setItem('somsom_name',name);
  $('submitBtn').disabled=true; $('submitBtn').textContent='등록 중...';
  try{
    const r=await fetch(FB+'/runner_scores?key='+FB_KEY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields:{n:{stringValue:name},s:{integerValue:String(lastResult.score)},t:{integerValue:String(Date.now())}}})});
    if(!r.ok) throw 0;
  }catch(e){ $('submitBtn').textContent='연결 실패 — 다시'; $('submitBtn').disabled=false; return; }
  sfx('record'); ui.showRanking(name);
}

// ================= 공유 카드 =================
let lastResult=null;
async function shareCard(){
  if(!lastResult) return;
  const SC=2,cw=420,ch=520; const c=document.createElement('canvas'); c.width=cw*SC; c.height=ch*SC;
  const x=c.getContext('2d'); x.scale(SC,SC);
  x.fillStyle='#fdfbf5'; x.fillRect(0,0,cw,ch); x.strokeStyle='#222'; x.lineWidth=3; x.strokeRect(10,10,cw-20,ch-20);
  x.textAlign='center'; x.fillStyle='#5a4a3a'; x.font='800 24px sans-serif'; x.fillText('🏃 끼토 마감 질주',cw/2,54);
  const spr=kkitoSpr; if(spr){ const h=190,w=h*(spr.height||spr.naturalHeight)/(spr.width||spr.naturalWidth); x.drawImage(spr,cw/2-w/2,76,w,h); }
  x.font='800 46px sans-serif'; x.fillStyle='#b08a3a'; x.fillText(lastResult.score+' m',cw/2,330);
  if(lastResult.isNew){ x.font='800 18px sans-serif'; x.fillStyle='#d2452a'; x.fillText('🎉 신기록 달성!',cw/2,360); }
  x.font='15px sans-serif'; x.fillStyle='#5a4a3a'; x.fillText('도토리 '+lastResult.coins+'개 수집',cw/2,392);
  x.font='12px sans-serif'; x.fillStyle='#9a8b7a'; x.fillText('pang861209-rgb.github.io/somsom-city-runner',cw/2,470);
  const blob=await new Promise(r=>c.toBlob(r,'image/png')); const file=new File([blob],'somsom_runner.png',{type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],title:'끼토 마감 질주'}); return; }catch(e){} }
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='somsom_runner.png'; a.click();
}

// ================= UI =================
const ui = {
  show(id){ for(const s of ['title','ranking','result']) $(s).classList.toggle('hidden', s!==id); },
  toTitle(){ cancelAnimationFrame(raf); S=null; stopBgm(); ui.show('title'); },
  play(){ cancelAnimationFrame(raf); for(const s of ['title','ranking','result']) $(s).classList.add('hidden'); S=newState(); startBgm(); S.last=performance.now(); raf=requestAnimationFrame(loop); },
  async showRanking(me){
    ui.show('ranking'); const box=$('rankList'); box.innerHTML='<div class="sub" style="padding:20px;">불러오는 중...</div>';
    const list=await lbGet();
    if(list===null){ box.innerHTML='<div class="sub" style="padding:20px;">랭킹 서버에 연결할 수 없어요 😢</div>'; return; }
    if(!list.length){ box.innerHTML='<div class="sub" style="padding:20px;">아직 기록이 없어요. 1호 주민이 되어보세요!</div>'; return; }
    box.innerHTML='';
    list.forEach((e,i)=>{ const row=document.createElement('div'); row.className='rankrow'+(me&&e.n===me&&e.s===(lastResult&&lastResult.score)?' me':'');
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'위';
      row.innerHTML='<span class="rk">'+medal+'</span><span class="rname">'+String(e.n).slice(0,8).replace(/[<>&]/g,'')+'</span><span class="rscore">'+(+e.s||0)+' m</span>';
      box.appendChild(row); });
  },
};

// ================= 입력 =================
function press(e){ if(e&&e.cancelable) e.preventDefault(); if(S && !S.over) jump(); }
addEventListener('keydown', e=>{ if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowLeft'){ e.preventDefault(); if(S&&!S.over) jump(); } });
cv.addEventListener('mousedown', press);
cv.addEventListener('touchstart', press, {passive:false});
</script>
